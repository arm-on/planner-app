{% extends 'base.html' %}
{% block head %}
    <style>
        .add-note-header {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-weight: 700;
            font-size: 1.3rem;
            color: #3a4a6b;
            margin-bottom: 0.5rem;
        }
        .add-note-card {
            background: #fff;
            border: 1.5px solid #e3e7f0;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(79,140,255,0.04);
            padding: 1.2rem 1.3rem 1.1rem 1.3rem;
            margin-bottom: 2rem;
        }
    </style>
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="add-note-header">
            <i class="bi bi-journal-plus"></i>
            Add Note for Task: {{ task.title }}
        </div>
        <a href="/dashboard" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>
    <div class="add-note-card">
        <form method="post" action="/notes/add-note" enctype="multipart/form-data">
            <input type="hidden" name="task_id" value="{{ task.id }}">
            <div class="mb-3">
                <label for="content" class="form-label">Note Content</label>
                <textarea class="form-control" name="content" id="content" rows="8"></textarea>
            </div>
            <div class="mb-3">
                <label for="attachments" class="form-label">Attach files</label>
                <input class="form-control" type="file" id="attachments" name="attachments" multiple>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle me-1"></i> Add Note
                </button>
                <a href="/notes/timeline?task_id={{ task.id }}" class="btn btn-outline-primary">
                    <i class="bi bi-journal-text me-1"></i> Back to Timeline
                </a>
            </div>
        </form>
    </div>
</div>
<script src="/static/vendor/ckeditor5/classic/ckeditor.js"></script>
<script>
    let noteEditor = null;
    const NOTE_BLOCK_SELECTOR = 'p, li, h1, h2, h3, h4, h5, h6, blockquote, td, th';

    function applyAutoDirection(root) {
        if (!root) return;
        root.querySelectorAll(NOTE_BLOCK_SELECTOR).forEach((node) => {
            if (!node.getAttribute('dir')) node.setAttribute('dir', 'auto');
            node.style.textAlign = 'start';
        });
    }

    class NotesUploadAdapter {
        constructor(loader) {
            this.loader = loader;
        }

        upload() {
            return this.loader.file.then(file => new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('file', file);
                fetch('/notes/upload-image', {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'
                }).then(response => response.json())
                .then(data => {
                    if (data.success && data.file && data.file.url) {
                        resolve({ default: data.file.url });
                    } else {
                        reject(data.message || 'Image upload failed.');
                    }
                }).catch(() => reject('Image upload failed.'));
            }));
        }

        abort() {}
    }

    function NotesUploadAdapterPlugin(editor) {
        editor.plugins.get('FileRepository').createUploadAdapter = loader => new NotesUploadAdapter(loader);
    }

    ClassicEditor.create(document.getElementById('content'), {
        extraPlugins: [NotesUploadAdapterPlugin],
        toolbar: [
            'heading', '|', 'bold', 'italic', 'link', 'blockQuote',
            'numberedList', 'bulletedList', '|', 'insertTable', 'uploadImage',
            '|', 'undo', 'redo'
        ],
        language: {
            ui: 'en',
            content: 'fa'
        },
        image: {
            toolbar: ['imageTextAlternative', 'imageStyle:inline', 'imageStyle:block', 'imageStyle:side']
        }
    }).then(editor => {
        noteEditor = editor;
        applyAutoDirection(editor.ui.getEditableElement());
        editor.model.document.on('change:data', () => {
            requestAnimationFrame(() => applyAutoDirection(editor.ui.getEditableElement()));
        });
    }).catch(error => {
        console.error(error);
    });

    document.querySelector('form').addEventListener('submit', function(e) {
        const value = noteEditor ? noteEditor.getData() : document.getElementById('content').value;
        document.getElementById('content').value = value;
        if (!value.trim()) {
            alert("Please enter some content for your note.");
            e.preventDefault();
        }
    });
</script>
{% endblock %}
