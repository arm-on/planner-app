<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Planner App{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons/css/bootstrap-icons.css" rel="stylesheet">
    {% block head %}{% endblock %}
    <link rel="stylesheet" href="/static/css/theme.css?v=1.0">
    <script src="/static/js/theme.js?v=1.0" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Planner App</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center text-muted py-3 mt-4">
        &copy; {{ 2024 }} Planner App
    </footer>
</body>
</html>
